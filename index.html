<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Morning Briefing</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0a0f1e; --surface: #111827; --border: #1f2a45;
      --text: #e8eaf0; --muted: #8892a4; --link: #60a5fa; --accent: #3b82f6;
    }
    body { background: var(--bg); color: var(--text); font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; min-height: 100vh; padding: 1.5rem; }
    header { display: flex; align-items: baseline; justify-content: space-between; flex-wrap: wrap; gap: 0.5rem; margin-bottom: 1.75rem; border-bottom: 1px solid var(--border); padding-bottom: 1rem; }
    header h1 { font-size: 1.6rem; font-weight: 700; letter-spacing: -0.5px; }
    header h1 span { color: var(--accent); }
    #meta { font-size: 0.85rem; color: var(--muted); }
    #refresh-btn { background: var(--accent); color: #fff; border: none; border-radius: 0.5rem; padding: 0.4rem 1rem; font-size: 0.85rem; cursor: pointer; transition: opacity 0.2s; }
    #refresh-btn:hover { opacity: 0.85; }
    #refresh-btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(310px, 1fr)); gap: 1.25rem; }
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: 0.875rem; padding: 1.1rem 1.25rem; display: flex; flex-direction: column; gap: 0.6rem; }
    .card-header { display: flex; align-items: center; gap: 0.55rem; margin-bottom: 0.25rem; }
    .card-header .dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
    .card-header h2 { font-size: 1rem; font-weight: 600; }
    .cat-us .dot { background: #3b82f6; }
    .cat-global .dot { background: #8b5cf6; }
    .cat-finance .dot { background: #10b981; }
    .cat-sports .dot { background: #f59e0b; }
    .cat-technology .dot { background: #06b6d4; }
    .cat-disruption .dot { background: #f97316; }
    .cat-risks .dot { background: #ef4444; }
    .article { padding: 0.65rem 0; border-top: 1px solid var(--border); }
    .article-num { font-size: 0.7rem; font-weight: 700; color: var(--muted); margin-bottom: 0.2rem; }
    .article-title a { color: var(--link); text-decoration: none; font-size: 0.92rem; font-weight: 500; line-height: 1.4; }
    .article-title a:hover { text-decoration: underline; }
    .article-meta { font-size: 0.75rem; color: var(--muted); margin-top: 0.2rem; }
    .article-summary { font-size: 0.82rem; color: #b0b8c8; line-height: 1.5; margin-top: 0.25rem; }
    .skeleton-card { background: var(--surface); border: 1px solid var(--border); border-radius: 0.875rem; padding: 1.1rem 1.25rem; }
    .skeleton-line { background: linear-gradient(90deg, #1a2236 25%, #232f4a 50%, #1a2236 75%); background-size: 200% 100%; animation: shimmer 1.4s infinite; border-radius: 4px; height: 12px; margin-bottom: 10px; }
    .skeleton-line.wide { width: 70%; }
    .skeleton-line.medium { width: 55%; }
    .skeleton-line.short { width: 40%; }
    @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
    .error-msg { color: #f87171; font-size: 0.82rem; margin-top: 0.5rem; }
    #top-error { background: #1f1010; border: 1px solid #7f1d1d; border-radius: 0.5rem; padding: 0.75rem 1rem; color: #f87171; font-size: 0.9rem; margin-bottom: 1rem; display: none; }
  </style>
</head>
<body>
  <header>
    <div>
      <h1>Morning <span>Briefing</span></h1>
      <div id="meta">Fetching latest headlines...</div>
    </div>
    <button id="refresh-btn" onclick="loadNews()">Refresh</button>
  </header>
  <div id="top-error"></div>
  <div id="grid" class="grid"></div>
  <script src="main.js"></script>
</body>
</html>
